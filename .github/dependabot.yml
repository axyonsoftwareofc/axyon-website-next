# Mantém as dependências atualizadas automaticamente
version: 2

updates:
  # Dependências do npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "⬆️ deps:"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Agrupa updates menores do React
      react:
        patterns:
          - "react*"
          - "@types/react*"
      # Agrupa updates do Next.js
      nextjs:
        patterns:
          - "next*"
          - "eslint-config-next"
      # Agrupa updates de dev dependencies
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    commit-message:
      prefix: "⬆️ ci:"
    labels:
      - "ci"
      - "automated"
